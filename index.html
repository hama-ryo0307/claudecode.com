<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠管理アプリ</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --danger: #dc2626;
    --success: #16a34a;
    --warn: #d97706;
    --bg: #f3f4f6;
    --card: #fff;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
    margin: 0; background: var(--bg); color: var(--text);
  }
  header {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0; font-size: 18px; }
  .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; }
  .badge {
    padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600;
  }
  .badge-admin { background: #fee2e2; color: #b91c1c; }
  .badge-member { background: #dbeafe; color: #1e40af; }
  .layout { display: flex; min-height: calc(100vh - 57px); }
  aside.sidebar {
    width: 260px; background: #fff; border-right: 1px solid var(--border);
    padding: 20px 14px; flex-shrink: 0;
  }
  aside.sidebar .nav-section-label {
    font-size: 13px; color: var(--muted); font-weight: 700;
    padding: 14px 14px 8px; letter-spacing: .04em;
  }
  aside.sidebar button {
    display: block; width: 100%; text-align: left;
    background: transparent; border: none; padding: 14px 16px; font-size: 17px;
    cursor: pointer; border-radius: 8px; color: var(--muted); margin-bottom: 4px;
    font-weight: 500;
  }
  aside.sidebar button.active { background: var(--primary); color: #fff; font-weight: 600; }
  aside.sidebar button:hover:not(.active) { background: #f3f4f6; color: var(--text); }
  main { flex: 1; max-width: 960px; padding: 20px; }
  @media (max-width: 720px) {
    .layout { flex-direction: column; }
    aside.sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 8px; }
    aside.sidebar .nav-section-label { display: none; }
    aside.sidebar button { display: inline-block; width: auto; margin-right: 4px; }
  }
  .card { background: var(--card); border-radius: 10px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .card h2 { margin: 0 0 12px; font-size: 16px; }
  button.btn {
    padding: 10px 16px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; color: #fff; background: var(--primary);
  }
  button.btn:hover { background: var(--primary-dark); }
  button.btn:disabled { opacity: .5; cursor: not-allowed; }
  button.btn-danger { background: var(--danger); }
  button.btn-success { background: var(--success); }
  button.btn-ghost { background: #f3f4f6; color: var(--text); }
  input, select, textarea {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 14px; font-family: inherit;
  }
  textarea { width: 100%; min-height: 100px; resize: vertical; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: #f9fafb; font-weight: 600; color: var(--muted); font-size: 12px; }
  td.num, th.num { font-variant-numeric: tabular-nums; }
  .status { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .status-pending { background: #fef3c7; color: #92400e; }
  .status-approved { background: #d1fae5; color: #065f46; }
  .status-rejected { background: #fee2e2; color: #991b1b; }
  .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .stat { background: #f9fafb; padding: 14px; border-radius: 8px; }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--text); }
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-head { text-align: center; font-size: 12px; color: var(--muted); padding: 6px; font-weight: 600; }
  .cal-cell {
    background: #f9fafb; border-radius: 6px; padding: 8px; min-height: 92px;
    font-size: 12px; position: relative; cursor: pointer;
    border: 2px solid transparent; transition: transform .08s, box-shadow .08s;
  }
  .cal-cell:hover:not(.empty) { box-shadow: 0 2px 8px rgba(0,0,0,.08); transform: translateY(-1px); }
  .cal-cell.empty { background: transparent; cursor: default; }
  .cal-cell.empty:hover { box-shadow: none; transform: none; }
  .cal-cell.today { outline: 2px solid var(--primary); outline-offset: -2px; }
  .cal-cell.attended { background: #d1fae5; border-color: #6ee7b7; }
  .cal-cell.late { background: #fef3c7; border-color: #fcd34d; }
  .cal-cell.absent-weekday { background: #fef2f2; }
  .cal-cell.weekend { background: #f3f4f6; opacity: .6; }
  .cal-cell .date-num { font-weight: 700; font-size: 22px; margin-bottom: 4px; line-height: 1; }
  .cal-cell.attended .date-num { color: #065f46; }
  .cal-cell.late .date-num { color: #92400e; }
  .cal-cell .att-time {
    font-size: 11px; font-variant-numeric: tabular-nums; color: #065f46; font-weight: 600;
    margin-bottom: 2px;
  }
  .cal-cell.late .att-time { color: #92400e; }
  .cal-cell .marker { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; margin-right: 2px; }
  .cal-cell .marker-att { background: rgba(255,255,255,.6); color: #065f46; }
  .cal-cell .marker-late { background: rgba(255,255,255,.6); color: #92400e; }
  .cal-cell .marker-shift { background: #dbeafe; color: #1e40af; }
  /* 出勤マーカー（attendances.date と一致した日のみに表示するドット） */
  .cal-cell .att-dot {
    position: absolute; top: 6px; right: 6px;
    width: 9px; height: 9px; border-radius: 50%;
    background: #16a34a; box-shadow: 0 0 0 2px #fff;
  }
  .cal-cell.late .att-dot { background: #d97706; }
  /* モーダル */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: #fff; border-radius: 12px; padding: 20px;
    width: min(560px, 92%); max-height: 80vh; overflow: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
  }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .modal-head h3 { margin: 0; font-size: 18px; }
  .modal .close-btn {
    background: transparent; border: none; font-size: 22px; cursor: pointer;
    padding: 4px 10px; line-height: 1; color: var(--muted); border-radius: 6px;
  }
  .modal .close-btn:hover { background: #f3f4f6; color: var(--text); }
  .att-pill {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .att-pill-ok { background: #d1fae5; color: #065f46; }
  .att-pill-late { background: #fef3c7; color: #92400e; }
  .att-pill-out { background: #e5e7eb; color: #374151; }
  .report-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
  .report-item:last-child { border-bottom: none; padding-bottom: 0; }
  .report-table th, .report-table td { vertical-align: top; }
  .report-table .report-content-cell {
    white-space: pre-wrap; max-height: 6em; overflow: auto;
    font-size: 13px; line-height: 1.5;
  }
  .report-table td .btn { padding: 5px 10px; font-size: 12px; }
  .report-table td .btn + .btn { margin-left: 4px; }
  @media (max-width: 480px) {
    /* スマホでは横スクロールで全列表示（親 .card に overflow-x:auto あり） */
    .report-table th, .report-table td { white-space: nowrap; }
    .report-table .report-content-cell { max-width: 240px; white-space: pre-wrap; }
  }
  .report-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .report-actions { margin-left: auto; display: flex; gap: 6px; }
  .report-actions .btn { padding: 6px 12px; font-size: 12px; }
  .editing-banner {
    background: #fef3c7; border: 1px solid #fcd34d; border-radius: 6px;
    padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #78350f;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .login-card { width: 400px; background: #fff; padding: 28px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .login-card h1 { margin: 0 0 20px; font-size: 22px; text-align: center; }
  .profile-select-list { display: flex; flex-direction: column; gap: 8px; }
  .profile-select-btn {
    display: flex; align-items: center; justify-content: space-between;
    background: #f9fafb; border: 1px solid var(--border); padding: 14px 16px;
    border-radius: 8px; cursor: pointer; font-size: 15px; width: 100%;
    transition: background .1s, border-color .1s;
  }
  .profile-select-btn:hover { background: #eff6ff; border-color: var(--primary); }
  .profile-name { font-weight: 600; }
  .login-list { display: flex; flex-direction: column; gap: 8px; }
  .login-list button {
    background: #f9fafb; border: 1px solid var(--border); padding: 12px;
    text-align: left; border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  .login-list button:hover { background: #f3f4f6; border-color: var(--primary); }
  .login-list .name { font-weight: 600; }
  .login-list .role { font-size: 12px; color: var(--muted); }
  .auth-tabs { display: flex; gap: 4px; background: #f3f4f6; padding: 4px; border-radius: 8px; margin-bottom: 16px; }
  .auth-tab {
    flex: 1; background: transparent; border: none; padding: 8px; font-size: 14px;
    cursor: pointer; border-radius: 6px; color: var(--muted); font-weight: 600;
  }
  .auth-tab.active { background: #fff; color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .auth-form { display: flex; flex-direction: column; gap: 12px; }
  .auth-form label {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 12px; color: var(--muted); font-weight: 600;
  }
  .auth-form input { width: 100%; }
  .auth-form .btn { margin-top: 6px; padding: 12px; }
  .auth-hint { font-size: 12px; color: var(--muted); text-align: center; margin: 14px 0 0; }
  .empty-msg { text-align: center; color: var(--muted); padding: 24px; font-size: 14px; }
  .clock-display {
    text-align: center; font-size: 36px; font-weight: 700;
    font-variant-numeric: tabular-nums; margin: 8px 0;
  }
  .date-display { text-align: center; color: var(--muted); margin-bottom: 16px; }
  details { background: #f9fafb; padding: 10px; border-radius: 6px; margin-top: 10px; }
  summary { cursor: pointer; font-weight: 600; font-size: 13px; }

  /* ===== 月次集計カード（4枚 横並び・文字大きめ） ===== */
  .summary-cards {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px; margin-bottom: 18px;
  }
  .summary-card {
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    padding: 22px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.05);
    display: flex; flex-direction: column; gap: 6px;
  }
  .summary-card .summary-label {
    font-size: 14px; font-weight: 600; color: var(--muted); letter-spacing: .02em;
  }
  .summary-card .summary-value {
    font-size: 38px; font-weight: 800; color: var(--text);
    font-variant-numeric: tabular-nums; line-height: 1.1; letter-spacing: -.01em;
  }
  .summary-card .summary-unit { font-size: 18px; font-weight: 700; color: var(--muted); margin-left: 4px; }
  .summary-card .summary-sub { font-size: 12px; color: var(--muted); }
  .summary-card.summary-attended { border-top: 4px solid #2563eb; }
  .summary-card.summary-total    { border-top: 4px solid #16a34a; }
  .summary-card.summary-overtime { border-top: 4px solid #d97706; }
  .summary-card.summary-shift    { border-top: 4px solid #7c3aed; }
  .summary-card.summary-pending  { border-top: 4px solid #db2777; }
  @media (max-width: 900px) {
    .summary-cards { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .summary-card { padding: 16px 14px; }
    .summary-card .summary-value { font-size: 30px; }
  }
  @media (max-width: 480px) {
    /* モバイルは2x2 グリッド */
    .summary-cards { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .summary-card { padding: 12px 10px; border-radius: 10px; }
    .summary-card .summary-label { font-size: 11px; }
    .summary-card .summary-value { font-size: 24px; }
    .summary-card .summary-unit { font-size: 13px; }
    .summary-card .summary-sub { font-size: 10px; }
  }

  /* ===== トースト通知 ===== */
  #toast-container {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
    display: flex; flex-direction: column; gap: 8px; pointer-events: none;
  }
  .toast {
    background: #111827; color: #fff; padding: 10px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 500; box-shadow: 0 4px 12px rgba(0,0,0,.18);
    min-width: 200px; max-width: 320px; opacity: 0; transform: translateY(-8px);
    transition: opacity .18s ease, transform .18s ease; pointer-events: auto;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.toast-success { background: #16a34a; }
  .toast.toast-error { background: #dc2626; }
  .toast.toast-info { background: #2563eb; }
  @media (max-width: 480px) {
    #toast-container { top: 8px; right: 8px; left: 8px; }
    .toast { min-width: 0; max-width: none; font-size: 12px; }
  }

  /* ===== スマホ (〜480px) 用のコンパクト調整 ===== */
  @media (max-width: 480px) {
    header { padding: 8px 12px; }
    header h1 { font-size: 15px; }
    .user-info { font-size: 12px; gap: 6px; }
    .user-info .btn { padding: 5px 10px; font-size: 12px; }
    .badge { padding: 1px 6px; font-size: 11px; }

    main { padding: 12px; }
    aside.sidebar { padding: 6px 8px; overflow-x: auto; white-space: nowrap; }
    aside.sidebar button { padding: 8px 12px; font-size: 13px; margin-right: 2px; margin-bottom: 0; }

    .card { padding: 12px; margin-bottom: 12px; border-radius: 8px; overflow-x: auto; }
    .card h2 { font-size: 15px; margin-bottom: 10px; }

    button.btn { padding: 8px 12px; font-size: 13px; }

    /* テーブル全般: 列パディング/フォントを縮める。横にあふれた分は親 .card がスクロール */
    table { font-size: 12px; min-width: 100%; }
    th, td { padding: 6px 6px; white-space: nowrap; }
    th { font-size: 11px; }

    /* フォーム行を縦積みに */
    .row { gap: 8px; }
    .row > label,
    .row > input,
    .row > select,
    .row > textarea { width: 100%; }
    .row > .btn { width: 100%; align-self: stretch !important; }

    /* 打刻 */
    .clock-display { font-size: 30px; }
    .date-display { font-size: 13px; }

    /* カレンダー: セルを小さく、見やすく */
    .calendar { gap: 2px; }
    .cal-head { font-size: 10px; padding: 4px 0; }
    .cal-cell { min-height: 56px; padding: 4px; border-width: 1px; }
    .cal-cell .date-num { font-size: 14px; margin-bottom: 2px; }
    .cal-cell .att-time { font-size: 9px; line-height: 1.1; }
    .cal-cell .marker { font-size: 9px; padding: 0 3px; margin-right: 1px; }

    /* カレンダー操作行: 集計を改行 */
    .calendar + .row { font-size: 11px; }

    /* ステータスピル */
    .status, .att-pill { font-size: 10px; padding: 1px 5px; }

    /* 日報: アクションを次の行へ回す */
    .report-head { gap: 6px; }
    .report-actions { margin-left: 0; width: 100%; }
    .report-actions .btn { padding: 5px 10px; font-size: 11px; flex: 1; }
    textarea { min-height: 80px; font-size: 13px; }

    /* ダッシュボード/承認/ログ: テーブル下の補足を改行 */
    .card .row { font-size: 11px; }

    /* モーダル */
    .modal { padding: 14px; max-height: 88vh; }
    .modal-head h3 { font-size: 15px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================
   勤怠管理アプリ — Supabase 連携版
   テーブル: profiles / attendances / shifts / daily_reports / action_logs
   ============================================ */

const SUPA_URL = "https://jboakakzwuvbgmxfhmhu.supabase.co";
const SUPA_KEY = "sb_publishable_EztMQd4TBmZH4pLksrs-Rg_xmX_YS_p";
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);

const KEYS = {
  profiles: "profiles",
  attendances: "attendances",
  shifts: "shifts",
  reports: "reports",
  logs: "logs",
  session: "att_session_v1",
};

const WORK_START = "09:00"; // 遅刻判定の基準

// ----- メモリキャッシュ（DB から読み込んで保持） -----
const cache = { profiles: [], attendances: [], shifts: [], reports: [], logs: [] };

// ----- DB 行 ↔ アプリ内オブジェクト変換 -----
const rowToAttendance = r => ({ id: r.id, userId: r.user_id, date: r.date, clockIn: r.clock_in, clockOut: r.clock_out });
const rowToShift = r => ({
  id: r.id, userId: r.user_id, userName: r.user_name, date: r.date,
  startTime: r.start_time ? r.start_time.slice(0,5) : null,
  endTime: r.end_time ? r.end_time.slice(0,5) : null,
  note: r.note, status: r.status,
  approverId: r.approver_id, approverName: r.approver_name, approvedAt: r.approved_at,
  createdAt: r.created_at,
});
const rowToReport = r => ({
  id: r.id, userId: r.user_id, date: r.date,
  content: r.content || "",
  createdAt: r.created_at,
});
const rowToLog = r => ({
  id: r.id, userId: r.user_id, userName: r.user_name,
  action: r.action, target: r.target, detail: r.detail, timestamp: r.timestamp,
});

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error(`${label} タイムアウト (${ms}ms)`)), ms)),
  ]);
}

async function safeQuery(label, builder) {
  try {
    const res = await withTimeout(builder, 8000, label);
    if (res.error) {
      console.error(`[${label}]`, res.error);
      return { data: null, error: res.error };
    }
    return res;
  } catch (e) {
    console.error(`[${label}] threw`, e);
    return { data: null, error: e };
  }
}

// ----- ダミーデータ（Supabase 接続不可時のフォールバック） -----
function generateDummyData() {
  const pad = n => String(n).padStart(2, "0");
  const isoJST = (y, m, d, h, min) => new Date(Date.UTC(y, m - 1, d, h - 9, min, 0)).toISOString();
  const dateStr = (y, m, d) => `${y}-${pad(m)}-${pad(d)}`;

  const dummyProfiles = [
    { id: "u1", name: "管理者 太郎", displayName: "管理者 太郎", role: "admin" },
    { id: "u2", name: "山田 花子", displayName: "山田 花子", role: "member" },
    { id: "u3", name: "佐藤 次郎", displayName: "佐藤 次郎", role: "member" },
    { id: "u4", name: "田中 三郎", displayName: "田中 三郎", role: "member" },
    { id: "u5", name: "鈴木 美咲", displayName: "鈴木 美咲", role: "member" },
    { id: "u6", name: "高橋 健太", displayName: "高橋 健太", role: "member" },
  ];

  const dummyAttendances = [];
  const dummyShifts = [];
  const dummyReports = [];
  const dummyLogs = [];

  const contents = [
    "午前中はフロントエンドのバグ修正を行いました。午後はチームミーティングに参加し、来週のスプリントの計画を立てました。",
    "新しいAPIエンドポイントの実装を完了しました。テストコードも書き、カバレッジ90%を達成しました。",
    "顧客からのフィードバックをもとにUI改善を行いました。レスポンシブ対応も修正しました。",
    "データベースのインデックス最適化を行い、クエリ速度が30%向上しました。",
    "コードレビューを3件実施しました。セキュリティに関する指摘を2点行い、修正を確認しました。",
    "社内勉強会の資料を作成しました。テーマはTypeScriptのジェネリクスについてです。",
    "障害対応：本番環境でのメモリリークを調査し、原因を特定。パッチを当てて解決しました。",
    "新機能のプロトタイプを作成し、PMとデザイナーにデモを行いました。",
  ];
  const statuses = ["pending", "approved", "rejected"];
  const actions = ["clock_in", "clock_out", "shift_request", "approve_shift", "save_report", "login"];

  const months = [{ y: 2026, m: 4, days: 30 }, { y: 2026, m: 5, days: 2 }];
  let seed = 42;
  const rng = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };

  for (const { y, m, days } of months) {
    for (let d = 1; d <= days; d++) {
      const dow = new Date(y, m - 1, d).getDay();
      if (dow === 0 || dow === 6) continue;
      const isToday = y === 2026 && m === 5 && d === 2;

      for (const user of dummyProfiles) {
        // 出勤 (85%)
        if (rng() < 0.85) {
          const inH = 8 + (rng() > 0.5 ? 1 : 0);
          const inM = Math.floor(rng() * 50);
          const outH = 17 + Math.floor(rng() * 3);
          const outM = Math.floor(rng() * 50);
          const hasOut = isToday ? rng() > 0.5 : true;
          dummyAttendances.push({
            id: `att-${user.id}-${y}${pad(m)}${pad(d)}`,
            userId: user.id,
            date: dateStr(y, m, d),
            clockIn: isoJST(y, m, d, inH, inM),
            clockOut: hasOut ? isoJST(y, m, d, outH, outM) : null,
          });
        }

        // シフト (35%, メンバーのみ)
        if (user.role !== "admin" && rng() < 0.35) {
          const status = statuses[Math.floor(rng() * statuses.length)];
          const isDecided = status !== "pending";
          dummyShifts.push({
            id: `shf-${user.id}-${y}${pad(m)}${pad(d)}`,
            userId: user.id,
            userName: user.name,
            date: dateStr(y, m, d),
            startTime: "09:00",
            endTime: `${17 + Math.floor(rng() * 2)}:00`,
            note: rng() > 0.5 ? "通常勤務希望" : null,
            status,
            approverId: isDecided ? "u1" : null,
            approverName: isDecided ? "管理者 太郎" : null,
            approvedAt: isDecided ? isoJST(y, m, Math.max(1, d - 1), 14, 30) : null,
            createdAt: isoJST(y, m, Math.max(1, d - 2), 10, 0),
          });
        }

        // 日報 (65%)
        if (rng() < 0.65) {
          dummyReports.push({
            id: `rpt-${user.id}-${y}${pad(m)}${pad(d)}`,
            userId: user.id,
            date: dateStr(y, m, d),
            content: contents[Math.floor(rng() * contents.length)],
            createdAt: isoJST(y, m, d, 18, Math.floor(rng() * 50)),
          });
        }

        // 操作ログ (2-3件)
        const logCount = 2 + Math.floor(rng() * 2);
        for (let i = 0; i < logCount; i++) {
          dummyLogs.push({
            id: `log-${user.id}-${y}${pad(m)}${pad(d)}-${i}`,
            userId: user.id,
            userName: user.name,
            action: actions[Math.floor(rng() * actions.length)],
            target: "attendances",
            detail: dateStr(y, m, d),
            timestamp: isoJST(y, m, d, 8 + Math.floor(rng() * 10), Math.floor(rng() * 60)),
          });
        }
      }
    }
  }

  return {
    profiles: dummyProfiles,
    attendances: dummyAttendances,
    shifts: dummyShifts,
    reports: dummyReports,
    logs: dummyLogs.sort((a, b) => b.timestamp.localeCompare(a.timestamp)),
  };
}

// ----- ユーティリティ -----
const pad = n => String(n).padStart(2, "0");

// JST 固定で日付/時刻表示
const JST = "Asia/Tokyo";
function jstParts(d) {
  // Intl で JST に変換した各パートを取得
  const fmt = new Intl.DateTimeFormat("en-CA", {
    timeZone: JST, year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
  });
  const parts = Object.fromEntries(fmt.formatToParts(d).map(p => [p.type, p.value]));
  return parts; // { year, month, day, hour, minute, second }
}
const fmtDate = d => { const p = jstParts(d); return `${p.year}-${p.month}-${p.day}`; };
const fmtTime = d => { const p = jstParts(d); return `${p.hour}:${p.minute}:${p.second}`; };
const fmtHM = d => { const p = jstParts(d); return `${p.hour}:${p.minute}`; };
const isoToHM = iso => iso ? fmtHM(new Date(iso)) : "—";
const isoToDateTime = iso => iso ? new Date(iso).toLocaleString("ja-JP", { timeZone: JST }) : "—";
const todayStr = () => fmtDate(new Date());
const escapeHtml = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

// ----- トースト通知 -----
function toast(message, type = "info") {
  let container = document.getElementById("toast-container");
  if (!container) {
    container = document.createElement("div");
    container.id = "toast-container";
    document.body.appendChild(container);
  }
  const el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.textContent = message;
  container.appendChild(el);
  requestAnimationFrame(() => el.classList.add("show"));
  setTimeout(() => {
    el.classList.remove("show");
    setTimeout(() => el.remove(), 200);
  }, 2800);
}

async function loadProfileForUser(authUser) {
  // profiles から該当行を取得。無ければ employee として作成。
  const sel = await safeQuery("loadProfile", supa.from("profiles").select("*").eq("id", authUser.id).maybeSingle());
  const { data, error } = sel;
  if (error) { console.error("profile fetch error", error); return null; }
  if (data) {
    return {
      id: data.id,
      name: data.display_name || data.name || authUser.email,
      displayName: data.display_name || data.name || "",
      role: data.role,
      email: authUser.email,
    };
  }
  // 自動作成（万一サインアップ時の insert が失敗していた場合のフォールバック）
  const fallbackName = (authUser.user_metadata && authUser.user_metadata.display_name) || authUser.email;
  const insertRow = { id: authUser.id, display_name: fallbackName, role: "employee" };
  const insRes = await safeQuery("createProfile", supa.from("profiles").insert(insertRow));
  const insErr = insRes.error;
  if (insErr) {
    if (insErr.code === "23505") {
      // 並行して別所で作成された → 再 SELECT
      const retryRes = await safeQuery("loadProfileRetry", supa.from("profiles").select("*").eq("id", authUser.id).maybeSingle());
      const retry = retryRes.data;
      if (retry) return {
        id: retry.id,
        name: retry.display_name || retry.name || authUser.email,
        displayName: retry.display_name || retry.name || "",
        role: retry.role,
        email: authUser.email,
      };
    }
    console.error("profile auto-create failed", insErr);
    return null;
  }
  return { id: authUser.id, name: fallbackName, displayName: fallbackName, role: "employee", email: authUser.email };
}

async function doSignup() {
  const email = document.getElementById("authEmail").value.trim();
  const password = document.getElementById("authPassword").value;
  const displayName = document.getElementById("authName").value.trim();
  if (!email || !password || !displayName) { toast("すべての項目を入力してください", "error"); return; }
  const submit = document.getElementById("authSubmit");
  submit.disabled = true; submit.textContent = "登録中…";
  try {
    const { data, error } = await supa.auth.signUp({
      email, password,
      options: { data: { display_name: displayName } },
    });
    if (error) { toast("サインアップ失敗: " + error.message, "error"); return; }
    const user = data.user;
    if (!user) { toast("ユーザー情報の取得に失敗しました", "error"); return; }
    // profiles に自動作成（id = auth.users.id）
    const { error: insErr } = await supa.from("profiles").insert({
      id: user.id, display_name: displayName, role: "employee",
    });
    if (insErr && insErr.code !== "23505") {
      toast("プロファイル作成に失敗: " + insErr.message, "error");
      return;
    }
    toast("登録が完了しました", "success");
    // signUp はセッションを自動付与する場合と確認待ちの場合がある
    if (data.session) {
      // onAuthStateChange が発火してアプリが再レンダリングされる
    } else {
      // セッションが無ければ続けてサインインを試行
      const { error: siErr } = await supa.auth.signInWithPassword({ email, password });
      if (siErr) {
        toast("サインアップ後の自動ログインに失敗: " + siErr.message + "（メール確認が必要かもしれません）", "error");
      }
    }
  } finally {
    submit.disabled = false;
    submit.textContent = authMode === "signup" ? "サインアップ" : "ログイン";
  }
}

function viewPunch() {
  const session = getSession();
  const today = todayStr();
  const records = load(KEYS.attendances);
  const rec = records.find(r => r.userId === session.id && r.date === today);

  setTimeout(() => {
    const tick = () => {
      const d = new Date();
      const el = document.getElementById("clk");
      if (!el) return;
      el.textContent = fmtTime(d);
    };
    tick();
    if (window.__clkTimer) clearInterval(window.__clkTimer);
    window.__clkTimer = setInterval(tick, 1000);
  }, 0);

  const status = !rec ? "未打刻"
    : rec.clockOut ? `退勤済 (${isoToHM(rec.clockIn)} 〜 ${isoToHM(rec.clockOut)})`
    : `出勤済 (${isoToHM(rec.clockIn)})`;

  const myRecent = records.filter(r => r.userId === session.id).sort((a,b) => a.date < b.date ? 1 : -1).slice(0, 7);

  return `
    <div class="card">
      <h2>本日の打刻</h2>
      <div class="date-display">${new Date().toLocaleDateString("ja-JP", { timeZone: JST, year:"numeric", month:"long", day:"numeric", weekday:"short" })}</div>
      <div class="clock-display" id="clk">--:--:--</div>
      <div class="row" style="justify-content:center;margin-top:12px;">
        <button class="btn" onclick="doClockIn()" ${rec ? "disabled" : ""}>出勤</button>
        <button class="btn btn-danger" onclick="doClockOut()" ${!rec || rec.clockOut ? "disabled" : ""}>退勤</button>
      </div>
      <p style="text-align:center;color:var(--muted);margin-top:12px;font-size:14px;">${status}</p>
      <p style="text-align:center;color:var(--muted);font-size:12px;">基準始業時刻: ${WORK_START}（これより遅い出勤は遅刻扱い） / 表示は日本時間</p>
    </div>
    <div class="card">
      <h2>直近の打刻履歴（自分）</h2>
      ${myRecent.length === 0 ? '<div class="empty-msg">記録がありません</div>' : `
        <table><thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th>勤務時間</th><th>遅刻</th></tr></thead>
        <tbody>${myRecent.map(r => {
          const inT = isoToHM(r.clockIn);
          const outT = isoToHM(r.clockOut);
          const dur = (r.clockIn && r.clockOut) ? durationStr(r.clockIn, r.clockOut) : "—";
          const late = isLate(r.clockIn) ? "✓" : "";
          return `<tr><td class="num">${r.date}</td><td class="num">${inT}</td><td class="num">${outT}</td><td class="num">${dur}</td><td class="num">${late}</td></tr>`;
        }).join("")}</tbody></table>
      `}
    </div>
  `;
}

function isLate(clockInIso) {
  if (!clockInIso) return false;
  const p = jstParts(new Date(clockInIso));
  const hm = `${p.hour}:${p.minute}`;
  return hm > WORK_START;
}

function durationStr(inIso, outIso) {
  const ms = new Date(outIso) - new Date(inIso);
  if (ms < 0) return "—";
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return `${h}時間${pad(m)}分`;
}

async function doClockIn() {
  const session = getSession();
  const today = todayStr();
  if (cache.attendances.find(r => r.userId === session.id && r.date === today)) {
    toast("すでに本日の出勤打刻があります", "info");
    return;
  }
  const now = new Date().toISOString();
  const row = { id: uid(), user_id: session.id, date: today, clock_in: now, clock_out: null };
  if (!offlineMode) {
    const { error } = await supa.from("attendances").insert(row);
    if (error) { toast("出勤の保存に失敗: " + error.message, "error"); return; }
    await refresh("attendances");
  } else {
    cache.attendances.push(rowToAttendance(row));
  }
  // 表示中のカレンダー月内なら再フェッチ
  if (today.startsWith(`${calMonth.y}-${pad(calMonth.m+1)}-`)) {
    await loadCalendarMonth(calMonth.y, calMonth.m);
    await loadDashboardStats(calMonth.y, calMonth.m);
  }
  toast(`出勤を記録しました（${isoToHM(now)} JST）`, "success");
  logAction("clock_in", "attendances", today);
  render();
}
async function doClockOut() {
  const session = getSession();
  const today = todayStr();
  const rec = cache.attendances.find(r => r.userId === session.id && r.date === today);
  if (!rec || rec.clockOut) {
    toast("退勤可能な出勤記録がありません", "info");
    return;
  }
  const now = new Date().toISOString();
  if (!offlineMode) {
    const { error } = await supa.from("attendances").update({ clock_out: now }).eq("id", rec.id);
    if (error) { toast("退勤の保存に失敗: " + error.message, "error"); return; }
    await refresh("attendances");
  } else {
    rec.clockOut = now;
  }
  if (today.startsWith(`${calMonth.y}-${pad(calMonth.m+1)}-`)) {
    await loadCalendarMonth(calMonth.y, calMonth.m);
    await loadDashboardStats(calMonth.y, calMonth.m);
  }
  toast(`退勤を記録しました（${isoToHM(now)} JST）`, "success");
  logAction("clock_out", "attendances", today);
  render();
}

          <input type="time" id="shiftEnd" value="18:00" step="900">

      </div>
      <p style="font-size:12px;color:var(--muted);margin-top:8px;">申請後は管理者の承認をお待ちください。承認後の取り消しはできません。</p>
    </div>
    <div class="card">
      <h2>自分のシフト申請</h2>
      ${shifts.length === 0 ? '<div class="empty-msg">申請はまだありません</div>' : `
        <table><thead><tr><th>希望日</th><th>時間帯</th><th class="num">時間</th><th>メモ</th><th>状態</th><th>承認者</th><th>承認日時</th></tr></thead>
        <tbody>${shifts.map(s => `
          <tr>
            <td class="num">${s.date}</td>
            <td class="num">${s.startTime || "—"} 〜 ${s.endTime || "—"}</td>
            <td class="num">${shiftHours(s)}</td>
            <td>${escapeHtml(s.note || "")}</td>
            <td>${statusBadge(s.status)}</td>
            <td>${escapeHtml(s.approverName || "—")}</td>
            <td class="num">${s.approvedAt ? new Date(s.approvedAt).toLocaleString("ja-JP") : "—"}</td>
          </tr>
        `).join("")}</tbody></table>
      `}
    </div>
  `;
}
function statusBadge(s) {
  if (s === "pending") return '<span class="status status-pending">申請中</span>';
  if (s === "approved") return '<span class="status status-approved">承認</span>';
  if (s === "rejected") return '<span class="status status-rejected">却下</span>';
  return s;
}
function shiftHours(s) {
  if (!s.startTime || !s.endTime) return "—";
  const [sh, sm] = s.startTime.split(":").map(Number);
  const [eh, em] = s.endTime.split(":").map(Number);
  const mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins <= 0) return "—";
  return `${(mins / 60).toFixed(1)}h`;
}

async function doSubmitShift() {
  const session = getSession();

  const row = {
    id: uid(), user_id: session.id, user_name: session.name,

    approver_id: null, approver_name: null, approved_at: null,

  };
  if (!offlineMode) {

let calMonth = (() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; })();
// 表示中の月で取得した出勤・シフト（.gte / .lte で絞り込み）
let calMonthData = { y: null, m: null, attendances: [], shifts: [], loading: false };

function monthBounds(y, m) {
  const first = `${y}-${pad(m+1)}-01`;
  const lastDay = new Date(y, m + 1, 0).getDate();
  const last = `${y}-${pad(m+1)}-${pad(lastDay)}`;
  return { first, last };
}

async function loadCalendarMonth(y, m) {
  const session = getSession();
  if (!session) return;
  const { first, last } = monthBounds(y, m);
  calMonthData.loading = true;

  if (offlineMode) {
    calMonthData = {
      y, m,
      attendances: cache.attendances.filter(r => r.userId === session.id && r.date >= first && r.date <= last),
      shifts: cache.shifts.filter(s => s.userId === session.id && s.status === "approved" && s.date >= first && s.date <= last),
      loading: false,
    };
    return;
  }

  const [att, shf] = await Promise.all([
    supa.from("attendances")
      .select("*")
      .eq("user_id", session.id)
      .gte("date", first)
      .lte("date", last)
      .order("date"),
    supa.from("shifts")
      .select("*")
      .eq("user_id", session.id)
      .eq("status", "approved")
      .gte("date", first)
      .lte("date", last)
      .order("date"),
  ]);
  if (att.error) toast("出勤データ取得失敗: " + att.error.message, "error");
  if (shf.error) toast("シフトデータ取得失敗: " + shf.error.message, "error");
  calMonthData = {
    y, m,
    attendances: (att.data || []).map(rowToAttendance),
    shifts: (shf.data || []).map(rowToShift),
    loading: false,
  };
}

function viewCalendar() {
  const session = getSession();
  const { y, m } = calMonth;
  const first = new Date(y, m, 1);
  const last = new Date(y, m + 1, 0);
  const startOffset = first.getDay();
  const daysInMonth = last.getDate();

  // 月範囲フェッチ済みデータを使用（未取得なら空配列）
  const monthLoaded = calMonthData.y === y && calMonthData.m === m;
  const myAtt = monthLoaded ? calMonthData.attendances : [];
  const myShifts = monthLoaded ? calMonthData.shifts : [];
  const todayKey = todayStr();
  const now = new Date();

  let cells = '';
  for (let i = 0; i < startOffset; i++) cells += `<div class="cal-cell empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${pad(m+1)}-${pad(d)}`;
    const a = myAtt.find(x => x.date === dateStr);
    const s = myShifts.find(x => x.date === dateStr);
    const cellDate = new Date(y, m, d);
    const dow = cellDate.getDay();
    const isPastWeekday = cellDate < new Date(now.getFullYear(), now.getMonth(), now.getDate()) && dow !== 0 && dow !== 6;

    const classes = [];
    if (dateStr === todayKey) classes.push("today");
    if (a && a.clockIn) classes.push(isLate(a.clockIn) ? "late" : "attended");
    else if (dow === 0 || dow === 6) classes.push("weekend");
    else if (isPastWeekday) classes.push("absent-weekday");

    let body = `<div class="date-num">${d}</div>`;
    // attendances.date と一致した日のみマーカー（ドット）を表示
    if (a && a.clockIn) {
      body += `<span class="att-dot" aria-label="出勤あり" title="出勤あり"></span>`;
      const inT = isoToHM(a.clockIn);
      const outT = a.clockOut ? isoToHM(a.clockOut) : "勤務中";
      body += `<div class="att-time">${inT}〜${outT}</div>`;
      if (isLate(a.clockIn)) body += `<span class="marker marker-late">遅刻</span>`;
    }
    if (s) body += `<span class="marker marker-shift">シフト</span>`;

    cells += `<div class="cal-cell ${classes.join(" ")}" onclick="showDayDetail('${dateStr}')">${body}</div>`;
  }

  // 月内自分の出勤集計
  const monthPrefix = `${y}-${pad(m+1)}-`;
  const monthAtt = myAtt.filter(r => r.date.startsWith(monthPrefix) && r.clockIn);
  const myDays = monthAtt.length;
  const myLate = monthAtt.filter(r => isLate(r.clockIn)).length;

  const loading = calMonthData.loading || !monthLoaded;

  return `
    <div class="card">
      <h2>カレンダー（${y}年${m+1}月）${loading ? ' <span style="font-size:12px;color:var(--muted);font-weight:normal;">読み込み中…</span>' : ""}</h2>
      <div class="row" style="margin-bottom:12px;">
        <button class="btn btn-ghost" onclick="calPrev()">← 前月</button>
        <button class="btn btn-ghost" onclick="calToday()">今月</button>
        <button class="btn btn-ghost" onclick="calNext()">翌月 →</button>
        <span style="margin-left:auto;font-size:13px;color:var(--muted);">
          自分の出勤: <strong style="color:#065f46;">${myDays}日</strong>　遅刻: <strong style="color:#92400e;">${myLate}回</strong>
        </span>
      </div>
      <div class="calendar">
        ${["日","月","火","水","木","金","土"].map(w => `<div class="cal-head">${w}</div>`).join("")}
        ${cells}
      </div>
      <div class="row" style="margin-top:12px;font-size:12px;color:var(--muted);flex-wrap:wrap;">
        <span style="display:inline-flex;align-items:center;gap:4px;"><span style="display:inline-block;width:10px;height:10px;background:#16a34a;border-radius:50%;box-shadow:0 0 0 2px #fff,0 0 0 3px #e5e7eb;"></span>出勤マーカー</span>
        <span style="display:inline-flex;align-items:center;gap:4px;"><span style="display:inline-block;width:14px;height:14px;background:#d1fae5;border:2px solid #6ee7b7;border-radius:3px;"></span>出勤</span>
        <span style="display:inline-flex;align-items:center;gap:4px;"><span style="display:inline-block;width:14px;height:14px;background:#fef3c7;border:2px solid #fcd34d;border-radius:3px;"></span>遅刻 (${WORK_START} 以降)</span>
        <span style="display:inline-flex;align-items:center;gap:4px;"><span style="display:inline-block;width:14px;height:14px;background:#fef2f2;border-radius:3px;"></span>欠勤（過去の平日）</span>
        <span style="display:inline-flex;align-items:center;gap:4px;"><span style="display:inline-block;width:14px;height:14px;background:#f3f4f6;border-radius:3px;opacity:.6"></span>休日</span>
        <span style="margin-left:auto;">📌 セルをタップで詳細</span>
      </div>
    </div>
  `;
}

function showDayDetail(dateStr) {
  const profiles = load(KEYS.profiles);
  const att = load(KEYS.attendances).filter(r => r.date === dateStr);
  const shifts = load(KEYS.shifts).filter(s => s.date === dateStr && s.status === "approved");

  const rows = profiles.filter(p => p.role === "member" || att.find(r => r.userId === p.id))
    .map(p => {
      const a = att.find(r => r.userId === p.id);
      const s = shifts.find(x => x.userId === p.id);
      return { p, a, s };
    });

  const presentCount = rows.filter(r => r.a && r.a.clockIn).length;
  const lateCount = rows.filter(r => r.a && r.a.clockIn && isLate(r.a.clockIn)).length;

  const dateObj = new Date(dateStr);
  const w = ["日","月","火","水","木","金","土"][dateObj.getDay()];

  const html = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-head">
          <h3>${dateStr}（${w}）の出勤状況</h3>
          <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <div class="row" style="margin-bottom:12px;font-size:13px;">
          <span>出勤者: <strong>${presentCount}名</strong></span>
          <span>遅刻: <strong>${lateCount}名</strong></span>
          <span>承認済シフト: <strong>${shifts.length}件</strong></span>
        </div>
        ${rows.length === 0 ? '<div class="empty-msg">対象ユーザーがいません</div>' : `
          <table>
            <thead><tr><th>氏名</th><th>状態</th><th class="num">出勤</th><th class="num">退勤</th><th class="num">勤務時間</th><th>シフト</th></tr></thead>
            <tbody>
              ${rows.map(({ p, a, s }) => {
                let pill = '<span class="att-pill att-pill-out">未出勤</span>';
                if (a && a.clockIn) {
                  pill = isLate(a.clockIn)
                    ? '<span class="att-pill att-pill-late">遅刻</span>'
                    : '<span class="att-pill att-pill-ok">出勤</span>';
                }
                const inT = a && a.clockIn ? a.clockIn.slice(11,16) : "—";
                const outT = a && a.clockOut ? a.clockOut.slice(11,16) : (a && a.clockIn ? "勤務中" : "—");
                const dur = (a && a.clockIn && a.clockOut) ? durationStr(a.clockIn, a.clockOut) : "—";
                const shiftStr = s ? `${s.startTime}〜${s.endTime}` : "—";
                return `<tr>
                  <td>${escapeHtml(p.name)}</td>
                  <td>${pill}</td>
                  <td class="num">${inT}</td>
                  <td class="num">${outT}</td>
                  <td class="num">${dur}</td>
                  <td class="num">${shiftStr}</td>
                </tr>`;
              }).join("")}
            </tbody>
          </table>
        `}
      </div>
    </div>
  `;
  const wrap = document.createElement("div");
  wrap.innerHTML = html;
  document.body.appendChild(wrap.firstElementChild);
}

function closeModal() {
  document.querySelectorAll(".modal-backdrop").forEach(m => m.remove());
}
async function reloadCurrentMonthData() {
  // 現在の表示画面に応じて当月データを再取得
  if (currentView === "calendar") {
    await loadCalendarMonth(calMonth.y, calMonth.m);
  } else if (currentView === "dashboard") {
    await loadDashboardStats(calMonth.y, calMonth.m);
  }
}
async function calPrev() {
  calMonth.m--; if (calMonth.m < 0) { calMonth.m = 11; calMonth.y--; }
  render();
  await reloadCurrentMonthData();
  render();
}
async function calNext() {
  calMonth.m++; if (calMonth.m > 11) { calMonth.m = 0; calMonth.y++; }
  render();
  await reloadCurrentMonthData();
  render();
}
async function calToday() {
  const d = new Date();
  calMonth = { y: d.getFullYear(), m: d.getMonth() };
  render();
  await reloadCurrentMonthData();
  render();
}

async function doPostReport() {
  const session = getSession();
  const dateInput = document.getElementById("reportDate").value;
  const content = document.getElementById("reportContent").value.trim();
  if (!dateInput) { toast("日付を選択してください", "error"); return; }
  if (!content) { toast("日報内容を入力してください（空欄不可）", "error"); return; }
  if (!offlineMode) {
    const { data, error } = await supa.from("daily_reports")
      .insert({ user_id: session.id, date: dateInput, content })
      .select()
      .single();
    if (error) { toast("投稿に失敗: " + error.message, "error"); return; }
    cache.reports.push(rowToReport(data));
  } else {
    cache.reports.push({ id: uid(), userId: session.id, date: dateInput, content, createdAt: new Date().toISOString() });
  }
  toast("投稿しました", "success");
  logAction("save_report", "daily_reports", dateInput);
  render();
}

function doDeleteReport(id) {
  const target = cache.reports.find(r => r.id === id);
  if (!target) { toast("対象の日報が見つかりません", "error"); return; }
  openDeleteReportDialog(target);

        <p style="font-size:12px;color:var(--muted);margin-top:10px;">この操作は元に戻せません。</p>
        <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end;">

  wrap.innerHTML = html;
  document.body.appendChild(wrap.firstElementChild);
  const btn = document.getElementById("confirmDeleteBtn");
  if (btn) btn.focus();
}

function closeDeleteReportDialog() {
  const el = document.getElementById("deleteReportBackdrop");
  if (el) el.remove();
  pendingDeleteReport = null;
}

async function confirmDeleteReport() {
  if (!pendingDeleteReport) return;
  const target = pendingDeleteReport;
  const btn = document.getElementById("confirmDeleteBtn");
  if (btn) { btn.disabled = true; btn.textContent = "削除中…"; }
  const { error } = await supa.from("daily_reports").delete().eq("id", target.id);
  if (error) {
    toast("削除に失敗: " + error.message, "error");
    if (btn) { btn.disabled = false; btn.textContent = "削除する"; }
    return;
  }
  // 配列からも除外（一覧を即時更新）
  cache.reports = cache.reports.filter(r => r.id !== target.id);
  toast("削除しました", "success");
  logAction("delete_report", "daily_reports", target.date);
  closeDeleteReportDialog();
  // フェッチを再実行して整合性を確保
  await loadDailyReports();
  render();
}

// ===== 編集ダイアログ =====
function openEditReportDialog(id) {
  selectedReport = cache.reports.find(r => r.id === id);
  if (!selectedReport) { toast("対象の日報が見つかりません", "error"); return; }
  const today = todayStr();
  const html = `
    <div class="modal-backdrop" id="editReportBackdrop" onclick="if(event.target===this)closeEditReportDialog()">
      <div class="modal" role="dialog" aria-labelledby="editReportTitle">
        <div class="modal-head">
          <h3 id="editReportTitle">日報を編集</h3>
          <button class="close-btn" onclick="closeEditReportDialog()" aria-label="閉じる">×</button>
        </div>
        <form id="editReportForm" onsubmit="event.preventDefault();doUpdateReport();">
          <label style="display:block;font-size:13px;font-weight:600;">日付</label>
          <input type="date" id="editReportDate" value="${selectedReport.date}" max="${today}" required style="width:200px;">
          <label style="display:block;font-size:13px;font-weight:600;margin-top:14px;">日報内容（必須）</label>
          <textarea id="editReportContent" required style="min-height:160px;"></textarea>
          <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">
            <button type="button" class="btn btn-ghost" onclick="closeEditReportDialog()">キャンセル</button>
            <button type="submit" class="btn">保存</button>
          </div>
        </form>
      </div>
    </div>`;
  const wrap = document.createElement("div");
  wrap.innerHTML = html;
  document.body.appendChild(wrap.firstElementChild);
  // useEffect 相当: モーダル表示後に既存 content をプリセット
  // (textarea の HTML 値プリセットはエスケープ仕様で改行が崩れる場合があるため JS で代入)
  const ta = document.getElementById("editReportContent");
  if (ta) {
    ta.value = selectedReport.content || "";
    ta.focus();
  }
}

function closeEditReportDialog() {
  const el = document.getElementById("editReportBackdrop");
  if (el) el.remove();
  selectedReport = null;
}

async function doUpdateReport() {
  if (!selectedReport) return;
  const dateInput = document.getElementById("editReportDate").value;
  const content = document.getElementById("editReportContent").value.trim();
  if (!dateInput) { toast("日付を選択してください", "error"); return; }
  if (!content) { toast("日報内容を入力してください（空欄不可）", "error"); return; }
  const id = selectedReport.id;
  const { error } = await supa.from("daily_reports")
    .update({ content, date: dateInput })
    .eq("id", id);
  if (error) { toast("更新に失敗: " + error.message, "error"); return; }
  toast("更新しました", "success");
  logAction("edit_report", "daily_reports", dateInput);
  closeEditReportDialog();
  // 一覧をリフレッシュ
  await loadDailyReports();
  render();
}

// ===========================================
//   5. ダッシュボード
// ===========================================
const STANDARD_WORK_HOURS = 8; // 1日あたりの所定労働時間（残業判定の基準）

// DB 集計のキャッシュ
let dashStats = {
  y: null, m: null, loading: false,
  workDays: 0, shiftCount: 0, pendingCount: 0, totalH: 0, overtimeH: 0,
};

async function loadDashboardStats(y, m) {
  const session = getSession();
  if (!session) return;
  const { first, last } = monthBounds(y, m);
  dashStats.loading = true;

  if (offlineMode) {
    const myAtt = cache.attendances.filter(r => r.userId === session.id && r.date >= first && r.date <= last && r.clockIn);
    const myShifts = cache.shifts.filter(s => s.userId === session.id && s.date >= first && s.date <= last);
    let totalMs = 0, overMs = 0;
    for (const r of myAtt) {
      if (r.clockIn && r.clockOut) {
        const ms = new Date(r.clockOut) - new Date(r.clockIn);
        if (ms > 0) { totalMs += ms; const o = ms - STANDARD_WORK_HOURS * 3600000; if (o > 0) overMs += o; }
      }
    }
    dashStats = { y, m, loading: false, workDays: myAtt.length, shiftCount: myShifts.length, pendingCount: myShifts.filter(s => s.status === "pending").length, totalH: totalMs / 3600000, overtimeH: overMs / 3600000 };
    return;
  }

  const [attRes, shiftCntRes, pendingCntRes] = await Promise.all([
    safeQuery("dash_attendances", supa.from("attendances")
      .select("id, clock_in, clock_out", { count: "exact" })
      .eq("user_id", session.id)
      .gte("date", first)
      .lte("date", last)
    ),
    safeQuery("dash_shift_count", supa.from("shifts")
      .select("*", { count: "exact", head: true })
      .eq("user_id", session.id)
      .gte("date", first)
      .lte("date", last)
    ),
    safeQuery("dash_pending_count", supa.from("shifts")
      .select("*", { count: "exact", head: true })
      .eq("user_id", session.id)
      .eq("status", "pending")
      .gte("date", first)
      .lte("date", last)
    ),
  ]);

  const attRows = attRes.data || [];
  const workDays = (attRes.count != null ? attRes.count : attRows.length);
  let totalMs = 0, overMs = 0;
  for (const r of attRows) {
    if (r.clock_in && r.clock_out) {
      const ms = new Date(r.clock_out) - new Date(r.clock_in);
      if (ms > 0) {
        totalMs += ms;
        const o = ms - STANDARD_WORK_HOURS * 3600000;
        if (o > 0) overMs += o;
      }
    }
  }

  dashStats = {
    y, m, loading: false,
    workDays,
    shiftCount: shiftCntRes.count || 0,
    pendingCount: pendingCntRes.count || 0,
    totalH: totalMs / 3600000,
    overtimeH: overMs / 3600000,
  };
}

function viewDashboard() {
  const session = getSession();
  const isAdmin = session.role === "admin";
  const profiles = load(KEYS.profiles);
  const att = load(KEYS.attendances);

  const targets = isAdmin ? profiles : [session];
  const { y, m } = calMonth;
  const monthPrefix = `${y}-${pad(m+1)}-`;

  const rows = targets.map(p => {
    const myAtt = att.filter(r => r.userId === p.id && r.date.startsWith(monthPrefix));
    const workDays = myAtt.filter(r => r.clockIn).length;
    const lateCount = myAtt.filter(r => isLate(r.clockIn)).length;
    let totalMs = 0;
    let overtimeMs = 0;
    for (const r of myAtt) {
      if (r.clockIn && r.clockOut) {
        const ms = new Date(r.clockOut) - new Date(r.clockIn);
        if (ms > 0) {
          totalMs += ms;
          const overMs = ms - STANDARD_WORK_HOURS * 3600000;
          if (overMs > 0) overtimeMs += overMs;
        }
      }
    }
    return {
      p, workDays, lateCount,
      totalH: totalMs / 3600000,
      overtimeH: overtimeMs / 3600000,
    };
  });

  // 集計行（admin のみ）
  const totals = rows.reduce((acc, r) => ({
    workDays: acc.workDays + r.workDays,
    lateCount: acc.lateCount + r.lateCount,
    totalH: acc.totalH + r.totalH,
    overtimeH: acc.overtimeH + r.overtimeH,
  }), { workDays: 0, lateCount: 0, totalH: 0, overtimeH: 0 });

  // 月次統計（DB 集計） — まだ取得していなければ「—」を表示
  const dashLoaded = dashStats.y === y && dashStats.m === m && !dashStats.loading;
  const fmtH = h => Number(h.toFixed(1)).toLocaleString("ja-JP");
  const dashVal = (loaded, value) => loaded ? value : `<span style="color:var(--muted);font-size:24px;">—</span>`;

  return `
    <div class="summary-cards">
      <div class="summary-card summary-attended">
        <div class="summary-label">今月の出勤日数</div>
        <div><span class="summary-value">${dashVal(dashLoaded, dashStats.workDays)}</span><span class="summary-unit">日</span></div>
        <div class="summary-sub">${y}年${m+1}月 / attendances</div>
      </div>
      <div class="summary-card summary-shift">
        <div class="summary-label">シフト申請数</div>
        <div><span class="summary-value">${dashVal(dashLoaded, dashStats.shiftCount)}</span><span class="summary-unit">件</span></div>
        <div class="summary-sub">${y}年${m+1}月 / shifts</div>
      </div>
      <div class="summary-card summary-pending">
        <div class="summary-label">承認待ち数</div>
        <div><span class="summary-value">${dashVal(dashLoaded, dashStats.pendingCount)}</span><span class="summary-unit">件</span></div>
        <div class="summary-sub">shifts.status = pending</div>
      </div>
      <div class="summary-card summary-total">
        <div class="summary-label">合計勤務時間</div>
        <div><span class="summary-value">${dashLoaded ? fmtH(dashStats.totalH) : `<span style="color:var(--muted);font-size:24px;">—</span>`}</span><span class="summary-unit">h</span></div>
        <div class="summary-sub">clock_out − clock_in の合計</div>
      </div>
    </div>
    ${dashStats.loading ? '<div style="text-align:center;color:var(--muted);font-size:12px;margin-bottom:12px;">統計を読み込み中…</div>' : ''}
    <div class="card">
      <h2>${y}年${m+1}月 勤怠サマリー（${isAdmin ? "全メンバー" : "自分"}）</h2>
      <table>
        <thead>
          <tr>
            <th>氏名</th>
            ${isAdmin ? '<th>役割</th>' : ''}
            <th class="num">出勤日数</th>
            <th class="num">遅刻回数</th>
            <th class="num">残業時間</th>
            <th class="num">総勤務時間</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr${r.p.id === session.id ? ' style="background:#eff6ff;"' : ''}>
              <td><strong>${escapeHtml(r.p.name)}</strong></td>
              ${isAdmin ? `<td>${r.p.role === 'admin' ? '管理者' : '一般'}</td>` : ''}
              <td class="num">${r.workDays} 日</td>
              <td class="num">${r.lateCount} 回</td>
              <td class="num">${r.overtimeH.toFixed(1)} h</td>
              <td class="num">${r.totalH.toFixed(1)} h</td>
            </tr>
          `).join("")}
          ${isAdmin && rows.length > 1 ? `
            <tr style="background:#f9fafb;font-weight:600;border-top:2px solid var(--border);">
              <td>合計</td>
              <td>—</td>
              <td class="num">${totals.workDays} 日</td>
              <td class="num">${totals.lateCount} 回</td>
              <td class="num">${totals.overtimeH.toFixed(1)} h</td>
              <td class="num">${totals.totalH.toFixed(1)} h</td>
            </tr>
          ` : ''}
        </tbody>
      </table>
      <div class="row" style="margin-top:12px;font-size:12px;color:var(--muted);flex-wrap:wrap;">
        <span>所定労働: ${STANDARD_WORK_HOURS}時間/日（超過分を残業として集計）</span>
        <span>遅刻基準: ${WORK_START} 以降の出勤</span>
        <span style="margin-left:auto;">表示月はカレンダーで選択した月に連動</span>
      </div>
    </div>
  `;
}

//   6. (管理者) 承認画面
// ===========================================
function viewApproval() {
  const session = getSession();
  if (session.role !== "admin") return `<div class="card"><div class="empty-msg">権限がありません</div></div>`;
  const shifts = load(KEYS.shifts).sort((a,b) => a.date < b.date ? 1 : -1);
  const pending = shifts.filter(s => s.status === "pending");
  const decided = shifts.filter(s => s.status !== "pending");

  return `
    <div class="card">
      <h2>承認待ちシフト (${pending.length})</h2>
      ${pending.length === 0 ? '<div class="empty-msg">承認待ちはありません</div>' : `
        <table>
          <thead><tr><th>申請者</th><th>希望日</th><th>時間帯</th><th class="num">時間</th><th>メモ</th><th>申請日時</th><th>操作</th></tr></thead>
          <tbody>${pending.map(s => `
            <tr>
              <td>${escapeHtml(s.userName)}</td>
              <td class="num">${s.date}</td>
              <td class="num">${s.startTime || "—"} 〜 ${s.endTime || "—"}</td>
              <td class="num">${shiftHours(s)}</td>
              <td>${escapeHtml(s.note || "")}</td>
              <td class="num">${new Date(s.createdAt).toLocaleString("ja-JP")}</td>
              <td>
                <button class="btn btn-success" onclick="doApprove('${s.id}', true)">承認</button>
                <button class="btn btn-danger" onclick="doApprove('${s.id}', false)">却下</button>
              </td>
            </tr>
          `).join("")}</tbody>
        </table>
        <p style="font-size:12px;color:var(--muted);margin-top:8px;">※ 承認・却下後の取り消しはできません。</p>
      `}
    </div>
    <div class="card">
      <h2>処理済み</h2>
      ${decided.length === 0 ? '<div class="empty-msg">処理済みの申請はありません</div>' : `
        <table>
          <thead><tr><th>申請者</th><th>希望日</th><th>時間帯</th><th>状態</th><th>承認者</th><th>承認日時</th></tr></thead>
          <tbody>${decided.map(s => `
            <tr>
              <td>${escapeHtml(s.userName)}</td>
              <td class="num">${s.date}</td>
              <td class="num">${s.startTime || "—"} 〜 ${s.endTime || "—"}</td>
              <td>${statusBadge(s.status)}</td>
              <td>${escapeHtml(s.approverName || "—")}</td>
              <td class="num">${s.approvedAt ? new Date(s.approvedAt).toLocaleString("ja-JP") : "—"}</td>
            </tr>
          `).join("")}</tbody>
        </table>
      `}
    </div>
  `;
}

async function doApprove(shiftId, approve) {
  const session = getSession();
  if (session.role !== "admin") return;
  const s = cache.shifts.find(x => x.id === shiftId);
  if (!s) return;
  if (s.status !== "pending") { alert("このシフトはすでに処理済みで変更できません。"); return; }
  if (!confirm(`このシフトを${approve ? "承認" : "却下"}します。一度決定すると元に戻せません。よろしいですか？`)) return;
  const newStatus = approve ? "approved" : "rejected";
  const approvedAt = new Date().toISOString();
  if (!offlineMode) {
    const { error } = await supa.from("shifts").update({
      status: newStatus, approver_id: session.id, approver_name: session.name, approved_at: approvedAt,
    }).eq("id", shiftId);
    if (error) { alert("承認処理に失敗: " + error.message); return; }
  }
  s.status = newStatus;
  s.approverId = session.id;
  s.approverName = session.name;
  s.approvedAt = approvedAt;
  logAction(approve ? "approve_shift" : "reject_shift", "shifts", `${s.userName}/${s.date}`);
  render();
}

// ===========================================
//   起動 / 認証ガード
// ===========================================
function showLoading(msg) {
  document.getElementById("app").innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#6b7280;font-size:14px;gap:14px;">
      <div>${escapeHtml(msg || "読み込み中…")}</div>
      <div id="loading-actions" style="display:none;flex-direction:column;gap:8px;align-items:center;">
        <div style="font-size:12px;">読み込みが終わらない場合:</div>
        <button class="btn btn-ghost" onclick="location.reload()">再読み込み</button>
        <button class="btn btn-danger" onclick="forceClearAuthAndReload()">ログイン情報をクリアして再読み込み</button>
      </div>
    </div>`;
  // 4秒後にエスケープボタンを出す
  setTimeout(() => {
    const a = document.getElementById("loading-actions");
    if (a) a.style.display = "flex";
  }, 4000);
}

async function forceClearAuthAndReload() {
  try { await supa.auth.signOut(); } catch (_) {}
  try {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith("sb-") || k.startsWith("supabase.")) localStorage.removeItem(k);
    });
  } catch (_) {}
  location.reload();
}

let entering = false;
async function enterApp(authUser) {
  if (entering) return;
  if (currentSession && currentSession.id === authUser.id) return;
  entering = true;
  try {
    showLoading("Supabase からデータを読み込み中…");
    let profile = await loadProfileForUser(authUser);
    // プロファイル取得に失敗した場合、Auth のメタデータからフォールバック
    if (!profile) {
      const meta = authUser.user_metadata || {};
      const fallbackName = meta.display_name || meta.full_name || authUser.email || "ユーザー";
      profile = {
        id: authUser.id,
        name: fallbackName,
        displayName: fallbackName,
        role: "employee",
        email: authUser.email,
      };
      console.warn("[enterApp] profile fetch failed, using fallback:", profile);
    }
    setSession(profile);
    await fetchAll();
    currentView = "punch";
    render();
    logAction("login", "session", null);
  } catch (e) {
    console.error("enterApp failed", e);
    document.getElementById("app").innerHTML = `
      <div style="padding:40px;text-align:center;color:#dc2626;">
        起動に失敗しました: ${escapeHtml(String(e && e.message || e))}
        <div style="margin-top:16px;"><button class="btn" onclick="location.reload()">再読み込み</button></div>
      </div>`;
  } finally {
    entering = false;
  }
}

function leaveApp() {
  clearSession();
  cache.profiles = []; cache.attendances = []; cache.shifts = []; cache.reports = []; cache.logs = [];
  currentView = "punch";
  authMode = "signin";
  renderLogin();
}

async function bootstrap() {
  showLoading("認証情報を確認中…");

  const safetyTimer = setTimeout(() => {
    if (!currentSession) {
      cache.profiles = []; cache.attendances = []; cache.shifts = []; cache.reports = []; cache.logs = [];
      currentSession = null;
      authMode = "signin";
      renderLogin();
      toast("認証/データ読込がタイムアウトしました。再度ログインしてください。", "error");
    }
  }, 12000);

  supa.auth.onAuthStateChange(async (event, session) => {
    if (event === "SIGNED_OUT" || !session) {
      leaveApp();
      return;
    }
    if (event === "SIGNED_IN" || event === "INITIAL_SESSION" || event === "TOKEN_REFRESHED") {
      await enterApp(session.user);
      if (currentSession) clearTimeout(safetyTimer);
    }
  });

  let session = null;
  try {
    const r = await withTimeout(supa.auth.getSession(), 5000, "auth.getSession");
    session = r.data && r.data.session ? r.data.session : null;
  } catch (e) {
    console.error("getSession timeout", e);
  }
  if (!session) {
    renderLogin();
    clearTimeout(safetyTimer);
  } else {
    setTimeout(async () => {
      if (!currentSession) {
        await enterApp(session.user);
        if (currentSession) clearTimeout(safetyTimer);
      }
    }, 1200);
  }
}

bootstrap().catch(e => {
  console.error(e);
  document.getElementById("app").innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626;">起動に失敗しました: ${String(e)}</div>`;
});
</script>
